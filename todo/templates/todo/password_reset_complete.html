<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Reset Complete - ToDo App</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; padding: 20px; text-align: center; }
        h2 { color: #27ae60; }
        .success-box { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; padding: 30px; border-radius: 8px; margin-bottom: 20px; }
        .icon { font-size: 48px; margin-bottom: 15px; }
        .info-text { color: #666; line-height: 1.6; margin-bottom: 20px; }
        .btn { display: inline-block; padding: 12px 30px; background: #27ae60; color: white; text-decoration: none; border-radius: 4px; }
        .btn:hover { background: #219a52; }
    </style>
</head>
<body>

<div class="success-box">
    <div class="icon">✅</div>
    <h2>Password Reset Complete</h2>
    <p class="info-text">
        Your password has been set. You may go ahead and log in now.
    </p>
</div>

<p><a href="{% url 'user_login' %}" class="btn">Log In</a></p>

</body>
</html>
